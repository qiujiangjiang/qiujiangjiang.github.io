<script>
    function urlencode (str) {  
    str = (str + '').toString();   

    return encodeURIComponent(str).replace(/!/g, '%21').replace(/'/g, '%27').replace(/\(/g, '%28').  
    replace(/\)/g, '%29').replace(/\*/g, '%2A').replace(/%20/g, '+');  
}

    const red_link = 'https://www.xiaohongshu.com/mobile/tags/sougood.top?name='
    const qrcode=new QRCode(document.querySelector("#qrcode"), "hello 1111111world"); 
    const qrcode_link=new QRCode(document.querySelector("#qrcode_link"), red_link+ "hello 1111111world"); 
    var btn=document.getElementById("btn1");
    btn.addEventListener('click',function(){
        get_qrcode()
        });
    function get_qrcode() {
        qrcode.makeCode(document.querySelector('textarea').value);
        qrcode_link.makeCode(red_link+urlencode(document.querySelector('textarea').value));
       // new QRCode(document.querySelector("#qrcode"), ); 
    }
